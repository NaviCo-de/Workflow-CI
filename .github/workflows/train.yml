name: MLflow retraining

on:
  workflow_dispatch:
  push:
    paths:
      - "MLProject/**"
      - ".github/workflows/train.yml"

permissions:
  contents: read

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      MLFLOW_TRACKING_URI: file://${{ github.workspace }}/MLProject/mlruns

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: MLProject/requirements.txt

      - name: Check environment
        run: python --version

      - name: Install dependencies
        run: python -m pip install -r MLProject/requirements.txt

      - name: Run MLflow Project
        run: >-
          mlflow run ./MLProject
          --env-manager=local
          --experiment-name=breast-cancer-ci

      - name: Validate MLflow output
        shell: bash
        run: |
          test -s MLProject/run_id.txt
          test -s MLProject/run_summary.json
          test -d MLProject/mlruns

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts-${{ github.run_number }}
          path: |
            MLProject/mlruns/
            MLProject/run_id.txt
            MLProject/run_summary.json
          retention-days: 30

      - name: Build MLflow Docker image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        shell: bash
        run: |
          RUN_ID="$(cat MLProject/run_id.txt)"
          mlflow models build-docker \
            --model-uri "runs:/${RUN_ID}/model" \
            --name "breast-cancer-pidi:${GITHUB_SHA}" \
            --enable-mlserver

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        shell: bash
        run: |
          LOCAL_IMAGE="breast-cancer-pidi:${GITHUB_SHA}"
          REMOTE_IMAGE="${DOCKERHUB_USERNAME}/breast-cancer-pidi"
          docker tag "${LOCAL_IMAGE}" "${REMOTE_IMAGE}:${GITHUB_SHA}"
          docker tag "${LOCAL_IMAGE}" "${REMOTE_IMAGE}:latest"
          docker push "${REMOTE_IMAGE}:${GITHUB_SHA}"
          docker push "${REMOTE_IMAGE}:latest"
